<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Switch Config</title>
</head>
<body>
  <h2>Send Switch Config</h2>

  <label>Upload devices.json:</label>
  <input type="file" id="devicesFile" accept=".json"><br><br>

  <select id="deviceSelect"></select><br>

  <label>Select protocol:</label>
  <select id="protocolSelect">
    <option value="ssh">SSH</option>
    <option value="telnet">Telnet</option>
  </select><br><br>

  <label>Upload config file (.txt only):</label>
  <input type="file" id="configFile" accept=".txt"><br>

  <button onclick="sendConfig()">Send</button>
  <pre id="output" style="color: red; font-weight: bold;"></pre>

  <script src="script.js"></script>
</body>
</html>
